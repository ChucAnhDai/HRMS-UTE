<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframes - HRM System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="mb-6 flex items-center justify-between">
            <div>
                <a href="index.html" class="text-indigo-600 hover:text-indigo-800 mb-2 inline-flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Back to Index
                </a>
                <h1 class="text-3xl font-bold text-gray-900">Wireframes</h1>
                <p class="text-gray-600 mt-1">Low-fidelity mockups of key screens.</p>
            </div>
        </div>

        <!-- Dashboard Wireframe -->
        <div class="mb-12">
            <h2 class="text-lg font-bold text-gray-800 mb-4">1. Dashboard Layout</h2>
            <div class="border-2 border-dashed border-gray-400 p-4 rounded-xl bg-gray-100 h-96 flex">
                <!-- Sidebar -->
                <div class="w-64 border-r-2 border-dashed border-gray-400 p-4 flex flex-col gap-4">
                    <div class="h-8 bg-gray-300 w-3/4 rounded"></div>
                    <div class="h-4 bg-gray-300 w-full rounded mt-8"></div>
                    <div class="h-4 bg-gray-300 w-full rounded"></div>
                    <div class="h-4 bg-gray-300 w-full rounded"></div>
                    <div class="h-4 bg-gray-300 w-full rounded"></div>
                </div>
                <!-- Content -->
                <div class="flex-1 p-8">
                    <div class="flex justify-between mb-8">
                        <div class="h-8 bg-gray-300 w-64 rounded"></div> <!-- Breadcrumb/Title -->
                        <div class="h-8 bg-gray-300 w-8 rounded-full"></div> <!-- User Icon -->
                    </div>
                    
                    <div class="grid grid-cols-3 gap-6">
                        <div class="h-32 bg-gray-200 border-2 border-dashed border-gray-400 rounded flex items-center justify-center text-gray-400">Stat Card</div>
                        <div class="h-32 bg-gray-200 border-2 border-dashed border-gray-400 rounded flex items-center justify-center text-gray-400">Stat Card</div>
                         <div class="h-32 bg-gray-200 border-2 border-dashed border-gray-400 rounded flex items-center justify-center text-gray-400">Stat Card</div>
                    </div>

                    <div class="mt-8 h-40 bg-gray-200 border-2 border-dashed border-gray-400 rounded flex items-center justify-center text-gray-400">
                        Recent Activity Table
                    </div>
                </div>
            </div>
        </div>

        <!-- Employee List Wireframe -->
        <div class="mb-12">
             <h2 class="text-lg font-bold text-gray-800 mb-4">2. Employee List</h2>
            <div class="border-2 border-dashed border-gray-400 p-8 rounded-xl bg-gray-100">
                <div class="flex justify-between mb-6">
                    <div class="h-8 bg-gray-300 w-48 rounded"></div> <!-- Search -->
                    <div class="h-8 bg-gray-300 w-32 rounded"></div> <!-- Add Button -->
                </div>
                
                <div class="space-y-4">
                    <div class="h-10 bg-white border-2 border-dashed border-gray-300 rounded w-full"></div>
                    <div class="h-10 bg-white border-2 border-dashed border-gray-300 rounded w-full"></div>
                    <div class="h-10 bg-white border-2 border-dashed border-gray-300 rounded w-full"></div>
                    <div class="h-10 bg-white border-2 border-dashed border-gray-300 rounded w-full"></div>
                </div>
                 <div class="mt-4 flex justify-end gap-2">
                    <div class="h-8 bg-gray-300 w-8 rounded"></div>
                    <div class="h-8 bg-gray-300 w-8 rounded"></div>
                    <div class="h-8 bg-gray-300 w-8 rounded"></div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
